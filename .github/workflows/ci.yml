name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # One runner per shipped target: macOS = aarch64, Linux = x86_64.
        # (MAE ships only those two assets, so `readall --arch=all` across
        # macOS-Intel / Linux-ARM is intentionally NOT used — those platforms
        # legitimately have no URL.)
        os: [macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out tap
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Point the cuttlefisch/mae tap at this checkout
        run: |
          dest="$(brew --repository)/Library/Taps/cuttlefisch/homebrew-mae"
          rm -rf "$dest"
          mkdir -p "$(dirname "$dest")"
          ln -s "$GITHUB_WORKSPACE" "$dest"
          brew tap

      # Style covers BOTH the formula and the cask — the gate that catches a
      # formula/cask token collision and style/convention regressions.
      #
      # NOTE: `brew readall` is intentionally NOT run. It validates the formula
      # against every platform symbol (macOS-Intel versions, arm64_linux, …), but
      # MAE ships only macos-aarch64 + linux-x86_64, so those platforms correctly
      # have no URL in the (style-required) arch-nested blocks. The per-runner
      # install smoke below is the meaningful load+resolve check for the two
      # platforms we actually ship.
      - name: brew style
        run: brew style cuttlefisch/mae

      # Install + smoke-test the CLI formula from the published release asset for
      # this runner's arch, and verify it actually links onto PATH (catches a bad
      # url/sha256 or the link regression that motivated this work).
      - name: Install + smoke-test the mae formula
        run: |
          brew install cuttlefisch/mae/mae
          command -v mae
          mae --version
          brew test cuttlefisch/mae/mae
