name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # One runner per shipped target: macOS = aarch64, Linux = x86_64.
        # (MAE ships only those two assets, so a `readall --arch=all` across
        # macOS-Intel / Linux-ARM is intentionally NOT used — those platforms
        # legitimately have no URL.)
        os: [macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Check out tap
        uses: actions/checkout@v4
        with:
          path: homebrew-mae

      - name: Tap from the checkout
        run: |
          taps="$(brew --repository)/Library/Taps/cuttlefisch"
          mkdir -p "$taps"
          ln -s "$GITHUB_WORKSPACE/homebrew-mae" "$taps/homebrew-mae"
          brew tap

      # Style covers BOTH the formula and the cask — the gate that catches a
      # formula/cask token collision and style/convention regressions.
      - name: brew style
        run: brew style cuttlefisch/mae

      # readall on the runner's own platform (no --arch=all): proves the formula
      # + cask load and that this platform resolves a URL.
      - name: brew readall
        run: brew readall cuttlefisch/mae

      # Install + smoke-test the CLI formula from the published release asset for
      # this runner's arch, and verify it actually links onto PATH (catches a bad
      # url/sha256 or the link regression that motivated this work).
      - name: Install + smoke-test the mae formula
        run: |
          brew install --formula cuttlefisch/mae/mae
          command -v mae
          mae --version
          brew test --formula cuttlefisch/mae/mae
