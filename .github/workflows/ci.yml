name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  # Lint + audit the tap: `brew test-bot --only-tap-syntax` runs `brew style`,
  # `brew readall`, and `brew audit` over the formula and cask. This is the gate
  # that catches structural problems — including a formula and cask sharing a
  # token (the collision that previously left `mae` unlinked after `brew upgrade`)
  # and style/audit regressions — before they reach users.
  tap-syntax:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Check out tap
        uses: actions/checkout@v4

      - name: Tap syntax (brew style + readall + audit)
        run: brew test-bot --only-tap-syntax
